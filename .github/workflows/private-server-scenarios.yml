name: Private-server Phase 1 scenarios

on:
  workflow_dispatch:

concurrency:
  group: private-server-phase1-matrix
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  matrix:
    name: Run exact-bundle scenario matrix
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run exact-bundle private-server matrix
        env:
          SCREEPS_STEAM_API_KEY: ${{ secrets.SCREEPS_STEAM_API_KEY }}
        run: |
          npm run private-server -- install
          npm run private-server -- provision
          npm run private-server:scenarios

      - name: Stop ignored private-server state
        if: always()
        run: npm run private-server -- stop
