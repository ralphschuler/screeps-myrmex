name: Private-server Phase 1 scenarios

on:
  workflow_dispatch:

concurrency:
  group: private-server-phase1-matrix
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  matrix:
    name: Run exact-bundle scenario matrix
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build exact production bundle
        run: npm run build

      - name: Set up isolated private-server Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.1

      - name: Install pinned private server without credentials
        run: node scripts/private-server.mjs install

      - name: Provision ignored private-server state
        env:
          SCREEPS_STEAM_API_KEY: ${{ secrets.SCREEPS_STEAM_API_KEY }}
        run: node scripts/private-server.mjs provision

      - name: Run exact-bundle private-server matrix
        env:
          SCREEPS_STEAM_API_KEY: ${{ secrets.SCREEPS_STEAM_API_KEY }}
        run: node scripts/private-server-scenarios.mjs

      - name: Stop ignored private-server state
        if: always()
        run: node scripts/private-server.mjs stop
